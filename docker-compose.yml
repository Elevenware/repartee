services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oidc4j
      POSTGRES_USER: oidc4j
      POSTGRES_PASSWORD: oidc4j
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  oidc-provider:
    image: georgemc/authentique:v0.1.1
    ports:
      - "8095:8095"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oidc4j
      SPRING_DATASOURCE_USERNAME: oidc4j
      SPRING_DATASOURCE_PASSWORD: oidc4j
      OIDC_ISSUER: ${OIDC_ISSUER:-http://authentique.localtest.me:8095}
      AUTHENTIQUE_BOOTSTRAP_OVERWRITE_EXISTING: ${AUTHENTIQUE_BOOTSTRAP_OVERWRITE_EXISTING:-false}
      AUTHENTIQUE_BOOTSTRAP_ENABLED: "true"
      AUTHENTIQUE_BOOTSTRAP_USERS_0_SUBJECT: george
      AUTHENTIQUE_BOOTSTRAP_USERS_0_USERNAME: george
      AUTHENTIQUE_BOOTSTRAP_USERS_0_PASSWORD: password
      AUTHENTIQUE_BOOTSTRAP_USERS_0_NAME: George McIntosh
      AUTHENTIQUE_BOOTSTRAP_USERS_0_GIVEN_NAME: George
      AUTHENTIQUE_BOOTSTRAP_USERS_0_FAMILY_NAME: McIntosh
      AUTHENTIQUE_BOOTSTRAP_USERS_0_EMAIL: george@example.com
      AUTHENTIQUE_BOOTSTRAP_USERS_0_EMAIL_VERIFIED: "true"
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_CLIENT_ID: client1
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_CLIENT_SECRET: client1secret
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_NAME: Starter Portal
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_OWNER_SUBJECT: george
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_GRANT_TYPES_0: authorization_code
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_GRANT_TYPES_1: refresh_token
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_SCOPES_0: openid
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_SCOPES_1: profile
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_SCOPES_2: email
      AUTHENTIQUE_BOOTSTRAP_CLIENTS_0_REDIRECT_URIS_0: http://repartee.localtest.me:7080/callback
    depends_on:
      - postgres
    networks:
      default:
        aliases:
          - authentique.localtest.me

  # RePartee — a smoke-test relying party. Not part of authentique itself; see
  # ./repartee/AGENTS.md and ./ADR_relyingpary.md. Lives here only because
  # it's the most convenient way to get end-to-end OIDC smoke tests with one
  # `docker compose up`.
  repartee:
    build: .
#    image: repartee:local
    ports:
      - "7080:7080"
    environment:
      RP_ADDR: ":7080"
      RP_REDIRECT_URI: ${RP_REDIRECT_URI:-http://repartee.localtest.me:7080/callback}

  # TLS reverse proxy. Enabled with `docker compose --profile tls up`.
  # Terminates TLS for ${AUTHENTIQUE_HOST} and ${REPARTEE_HOST} and proxies
  # to the OIDC provider and RePartee respectively. Certs come from the
  # `certbot` service via the shared `letsencrypt` volume; nginx polls
  # for updates on a timer (see nginx/docker-entrypoint.d/40-reload-loop.sh)
  # so renewed certs get picked up without restarting the container.
  nginx:
    image: nginx:1.27.5-alpine
    profiles: [tls]
    ports:
      - "80:80"
      - "443:443"
    environment:
      AUTHENTIQUE_HOST: ${AUTHENTIQUE_HOST:-authentique.oidc4j.com}
      REPARTEE_HOST: ${REPARTEE_HOST:-repartee.oidc4j.com}
      NGINX_RELOAD_INTERVAL: ${NGINX_RELOAD_INTERVAL:-21600}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/docker-entrypoint.d/40-reload-loop.sh:/docker-entrypoint.d/40-reload-loop.sh:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      certbot:
        condition: service_healthy
      oidc-provider:
        condition: service_started
      repartee:
        condition: service_started
    restart: unless-stopped

  # Obtains and renews a SAN cert covering both hostnames via Cloudflare
  # DNS-01. Long-running: it does an initial issuance (no-op if a cert is
  # already on disk) and then loops attempting renewal. The healthcheck
  # gates the nginx service until the live cert file exists.
  certbot:
    image: certbot/dns-cloudflare:v2.11.0
    profiles: [tls]
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./certbot/cloudflare.ini:/run/secrets/cloudflare.ini:ro
      - ./certbot/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    environment:
      AUTHENTIQUE_HOST: ${AUTHENTIQUE_HOST:-authentique.oidc4j.com}
      REPARTEE_HOST: ${REPARTEE_HOST:-repartee.oidc4j.com}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
      CERTBOT_RENEW_INTERVAL: ${CERTBOT_RENEW_INTERVAL:-43200}
    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/letsencrypt/live/$$AUTHENTIQUE_HOST/fullchain.pem"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 300s
    restart: unless-stopped

volumes:
  pgdata:
  letsencrypt:
